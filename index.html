
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🎰 CASINO ЕГЭ: Ставки на знания</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            overflow-x: hidden;
            position: relative;
        }

        /* Анимированный фон с монетами */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 20% 40%, rgba(212, 175, 55, 0.08) 2%, transparent 2.5%),
                              radial-gradient(circle at 75% 85%, rgba(212, 175, 55, 0.06) 1.5%, transparent 2%);
            background-size: 55px 55px, 80px 80px;
            pointer-events: none;
            z-index: 0;
        }

        /* главный контейнер — полноэкранная прокрутка, но не "табличка" */
        .site-wrapper {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.2rem 2rem;
        }

        /* карточки с неоновым свечением */
        .glass-panel {
            background: rgba(12, 16, 28, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2.5rem;
            border: 1px solid rgba(245, 176, 66, 0.35);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.1) inset;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* хедер с балансом */
        .header-gold {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 1.2rem 2rem;
            background: linear-gradient(115deg, #0b0e1a 0%, #13172b 100%);
            border-bottom: 2px solid #f0b349;
            border-radius: 2rem 2rem 1rem 1rem;
            margin-bottom: 1.8rem;
        }

        .logo h1 {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFE6A3, #D4AF37, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo p {
            font-size: 0.75rem;
            color: #9aa3c2;
            margin-top: 4px;
        }

        .balance-box {
            background: #070913;
            border-radius: 3rem;
            padding: 0.5rem 1.6rem;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            border: 1px solid #ffd96680;
        }

        .balance-label {
            font-weight: 600;
            color: #dfe6ff;
        }

        .balance-amount {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #FFD966, #F5A623);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-feature-settings: "tnum";
        }

        .coin-symbol {
            font-size: 1.8rem;
            filter: drop-shadow(0 2px 3px gold);
        }

        /* секция выбора предмета и ставки */
        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.45);
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            margin-bottom: 2rem;
        }

        .subjects-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 0.7rem;
        }

        .subj-chip {
            background: #1b1f33;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 2.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            color: #cbd5ff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }

        .subj-chip.active {
            background: linear-gradient(125deg, #f5b042, #e28d1c);
            color: #0f0c1a;
            box-shadow: 0 4px 12px rgba(245,176,66,0.5);
            text-shadow: 0 0 2px rgba(0,0,0,0.2);
        }

        .bet-zone {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b0e18;
            padding: 0.3rem 0.8rem 0.3rem 1.5rem;
            border-radius: 3rem;
        }

        .bet-input {
            background: #1e253f;
            border: none;
            padding: 0.65rem 1rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            width: 120px;
            text-align: center;
            color: #ffe2a4;
            font-family: monospace;
            outline: none;
        }

        .btn-bet {
            background: radial-gradient(ellipse at 30% 30%, #ffc857, #e69a2e);
            border: none;
            padding: 0.65rem 1.6rem;
            border-radius: 2.5rem;
            font-weight: 800;
            font-size: 0.9rem;
            color: #151e2c;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 5px 0 #8b5200;
        }

        .btn-bet:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b5200;
        }

        .btn-reset {
            background: #2d2a3e;
            border: 1px solid #f5b04260;
            color: #ffdd99;
        }

        /* игровая арена - вопрос */
        .question-arena {
            background: rgba(8, 10, 20, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem;
            margin: 1rem 0;
            border: 1px solid #f5b04255;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 1.8rem;
            color: #FFF2DC;
            border-left: 5px solid #f5b042;
            padding-left: 1rem;
        }

        .options-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .opt-card {
            background: #13182b;
            border-radius: 1.3rem;
            padding: 0.8rem 1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #2c3357;
        }

        .opt-card.selected {
            background: linear-gradient(115deg, #2c2848, #1f2440);
            border-color: #f5b042;
            box-shadow: 0 0 0 2px rgba(245,176,66,0.6);
        }

        .opt-letter {
            font-weight: 800;
            background: #252c48;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            color: #f5b042;
            font-size: 1.1rem;
        }

        .opt-text {
            color: #eef3ff;
            font-weight: 500;
            word-break: break-word;
        }

        .answer-btn {
            background: #2d6b3c;
            box-shadow: 0 4px 0 #1f4829;
            margin-top: 0.5rem;
            width: 100%;
            max-width: 280px;
            display: inline-block;
            text-align: center;
            border: none;
            padding: 0.8rem;
            font-weight: 800;
            font-size: 1rem;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: 0.08s linear;
        }

        .message-panel {
            margin-top: 1.2rem;
            padding: 0.9rem;
            border-radius: 2rem;
            background: #090d1a;
            text-align: center;
            font-weight: 600;
            color: #ffeaac;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #5f6b9b;
            border-top: 1px solid #232842;
            padding-top: 1.5rem;
        }

        @media (max-width: 680px) {
            .site-wrapper {
                padding: 0.8rem;
            }
            .header-gold {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
            }
            .balance-box {
                justify-content: center;
            }
            .action-row {
                flex-direction: column;
                align-items: stretch;
            }
            .subjects-scroll {
                justify-content: center;
            }
            .bet-zone {
                justify-content: space-between;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .opt-card {
                padding: 0.7rem;
            }
        }

        .disabled-btn {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.1);
        }

        .win-effect {
            animation: coinFlash 0.4s ease;
        }

        @keyframes coinFlash {
            0% { text-shadow: 0 0 0 gold; transform: scale(1);}
            50% { text-shadow: 0 0 12px gold; transform: scale(1.05);}
        }

        button {
            font-family: inherit;
        }
    </style>
</head>
<body>
<div class="site-wrapper">
    <div class="glass-panel header-gold">
        <div class="logo">
            <h1>🎲 CASINO ЕГЭ <span>🎓</span></h1>
            <p>Ставь монеты — докажи знания. Верный ответ = x2!</p>
        </div>
        <div class="balance-box">
            <span class="coin-symbol">🪙</span>
            <span class="balance-label">БАНК</span>
            <span class="balance-amount" id="balanceValue">1500</span>
        </div>
    </div>

    <div class="action-row">
        <div class="subjects-scroll" id="subjectsList">
            <button data-subj="math_base" class="subj-chip active">📐 МАТЕМАТИКА (БАЗА)</button>
            <button data-subj="math_prof" class="subj-chip">⚡ МАТЕМАТИКА (ПРОФИЛЬ)</button>
            <button data-subj="russian" class="subj-chip">📖 РУССКИЙ ЯЗЫК</button>
            <button data-subj="inf" class="subj-chip">💻 ИНФОРМАТИКА</button>
        </div>
        <div class="bet-zone">
            <span style="color:#FFD966;">💰 СТАВКА</span>
            <input type="number" id="betAmount" class="bet-input" value="80" min="10" step="10">
            <button id="placeBetAction" class="btn-bet">🎲 КРУТИТЬ ВОПРОС</button>
            <button id="resetBalanceBtn" class="btn-bet btn-reset">🔄 СБРОС</button>
        </div>
    </div>

    <div id="gameContainer" class="question-arena" style="display: none;">
        <div class="question-text" id="questionText">Загрузка вопроса...</div>
        <div class="options-wrapper" id="optionsList"></div>
        <div style="display: flex; justify-content: flex-end;">
            <button id="submitAnswer" class="answer-btn">✅ ОТВЕТИТЬ И ЗАБРАТЬ ВЫИГРЫШ</button>
        </div>
    </div>

    <div id="infoMsg" class="message-panel">
        🎰 ВЫБЕРИ ПРЕДМЕТ, СДЕЛАЙ СТАВКУ И ОТВЕТЬ НА ВОПРОС ЕГЭ! ПРАВИЛЬНЫЙ ОТВЕТ = x2 СТАВКИ
    </div>
    <div class="footer">
        ⚡ Виртуальные монеты · Рискни эрудицией · Вопросы из открытого банка ЕГЭ
    </div>
</div>

<script>
    // -------------------------- БОЛЬШАЯ БАЗА ВОПРОСОВ ЕГЭ --------------------------
    const QUESTIONS_BANK = {
        math_base: [   // базовая математика
            { text: "Найдите значение выражения: 4/5 + 3/10", options: ["0,9", "1,1", "0,8", "1,2"], correct: 1 },
            { text: "Расположите числа в порядке возрастания: 0,3; 0,33; 1/3", options: ["0,3; 0,33; 1/3", "1/3; 0,33; 0,3", "0,33; 0,3; 1/3", "0,3; 1/3; 0,33"], correct: 0 },
            { text: "В магазине скидка 20% на товар. Цена после скидки — 800 руб. Найдите исходную цену.", options: ["1000 руб", "960 руб", "900 руб", "1100 руб"], correct: 0 },
            { text: "Решите уравнение: 3x - 7 = 14", options: ["7", "5", "8", "6"], correct: 0 },
            { text: "В треугольнике два угла равны 45° и 90°. Найдите третий угол.", options: ["45°", "60°", "30°", "50°"], correct: 0 },
            { text: "Площадь квадрата 64 см². Чему равен периметр?", options: ["32 см", "24 см", "36 см", "28 см"], correct: 0 },
            { text: "Какое число является корнем уравнения 2ˣ = 16?", options: ["4", "3", "5", "2"], correct: 0 },
            { text: "Найдите среднее арифметическое чисел: 12, 15, 18", options: ["15", "16", "14", "17"], correct: 0 },
            { text: "Сколько целых чисел расположено между √9 и √49?", options: ["3", "4", "5", "6"], correct: 1 },
            { text: "В цилиндре радиус основания 2, высота 5. Найдите объём (π≈3).", options: ["60", "30", "45", "75"], correct: 0 },
            { text: "Найдите sin 60°", options: ["√3/2", "1/2", "√2/2", "1"], correct: 0 },
            { text: "Если число увеличили на 25%, получили 100. Найти исходное число.", options: ["80", "75", "85", "90"], correct: 0 }
        ],
        math_prof: [   // профильная математика (более сложные)
            { text: "Найдите производную функции f(x) = x²·ln x", options: ["2x ln x + x", "2x ln x", "x(2 ln x + 1)", "x ln x + x"], correct: 2 },
            { text: "Решите уравнение: 2^(x+1) = 8", options: ["2", "3", "1", "4"], correct: 0 },
            { text: "Найдите значение выражения: log₃ 81 + log₂ 16", options: ["8", "7", "9", "10"], correct: 0 },
            { text: "Найдите наибольшее значение функции y = -x² + 4x - 1 на отрезке [0,3]", options: ["3", "2", "4", "1"], correct: 0 },
            { text: "Векторы a(2; -3) и b(-4; 6) являются ...", options: ["коллинеарными", "перпендикулярными", "сонаправленными", "противоположными"], correct: 0 },
            { text: "В прямоугольном треугольнике катеты 6 и 8. Найдите гипотенузу.", options: ["10", "14", "12", "9"], correct: 0 },
            { text: "Решите неравенство: (x-2)(x+3) > 0", options: ["(-∞;-3)∪(2;∞)", "(-3;2)", "(-∞;2)", "(2;∞)"], correct: 0 },
            { text: "Найдите корень уравнения: √(3x-2) = 4", options: ["6", "4", "5", "7"], correct: 0 },
            { text: "Тригонометрическое уравнение: sin x = 1/2, найдите наименьший положительный корень", options: ["π/6", "π/3", "π/2", "π"], correct: 0 },
            { text: "Первый член арифметической прогрессии 5, разность 3. Найдите сумму первых 10 членов.", options: ["185", "190", "180", "195"], correct: 0 },
            { text: "Найдите площадь фигуры, ограниченной линиями y = x², y = 0, x = 2", options: ["8/3", "4", "6", "2"], correct: 0 }
        ],
        russian: [
            { text: "В каком слове верно выделена буква, обозначающая ударный гласный звук?", options: ["нАчать", "красИвее", "звонИт", "кУхонный"], correct: 1 },
            { text: "В каком слове на месте пропуска пишется две НН?", options: ["юн_ый", "серебр_ый", "стекл_ый", "песчан_ый"], correct: 2 },
            { text: "Укажите пример с ошибкой в образовании формы слова:", options: ["пара туфель", "более красивее", "пять килограммов", "лягте на пол"], correct: 1 },
            { text: "В каком ряду во всех словах пропущена безударная проверяемая гласная корня?", options: ["с_деть (на стуле), обл_котиться, раздр_жать", "пол_скать, выр_стить, зам_рать", "приг_реть, к_сание, г_релка", "уд_вительный, просл_влять, отв_рить"], correct: 3 },
            { text: "Какое средство выразительности: «Лёгкий ветерок играл с листвой»", options: ["олицетворение", "метафора", "эпитет", "сравнение"], correct: 0 },
            { text: "В каком предложении нужно поставить ОДНУ запятую?", options: ["Он вышел из дома и направился к реке и остановился.", "Ветер то затихал то снова налетал.", "Я позвонил другу и брату и сестре.", "Солнце светило но было прохладно."], correct: 1 },
            { text: "Укажите слово с чередующейся гласной в корне:", options: ["выросли", "гористый", "водитель", "полевой"], correct: 0 },
            { text: "В каком варианте оба слова пишутся слитно?", options: ["(пол)листа, (кое)кто", "(по)немногу, (в)виду болезни", "(северо)восток, (ярко)красный", "(в)течение часа, (в)следствие непогоды"], correct: 1 }
        ],
        inf: [
            { text: "Сколько единиц в двоичной записи числа 123?", options: ["5", "4", "6", "3"], correct: 2 },
            { text: "Для какого числа X ложно: (X>5) ИЛИ НЕ (X<8)?", options: ["6", "7", "8", "4"], correct: 2 },
            { text: "Чему равно 11101₂ + 101₂?", options: ["100010₂", "100001₂", "11110₂", "11001₂"], correct: 0 },
            { text: "Что будет выведено? a=3; b=5; a,b = b,a; print(a,b)", options: ["5 3", "3 5", "5 5", "3 3"], correct: 0 },
            { text: "Дан фрагмент: s=0; for i in range(1,5): s+=i; print(s)", options: ["10", "6", "15", "5"], correct: 0 },
            { text: "Логическая схема И-НЕ выдаёт 0, если...", options: ["оба входа 1", "оба входа 0", "хотя бы один 0", "входы различны"], correct: 0 },
            { text: "Переведите число 45₁₀ в шестнадцатеричную систему", options: ["2D", "2E", "3C", "2F"], correct: 0 },
            { text: "Для какого слова истинно: (первая буква гласная) И НЕ(последняя буква согласная)?", options: ["Арбуз", "Окно", "Игла", "Утюг"], correct: 2 },
            { text: "Сколько Кбайт в 2²⁴ битах?", options: ["2048", "1024", "4096", "512"], correct: 0 }
        ]
    };

    // Состояние приложения
    let balance = 1500;
    let currentSubject = "math_base";
    let activeGame = false;      // активна ли игра (ставка сделана, ждём ответ)
    let currentBet = 0;
    let currentQuestion = null;
    let selectedOptionIdx = null;

    // DOM элементы
    const balanceSpan = document.getElementById("balanceValue");
    const betInput = document.getElementById("betAmount");
    const placeBtn = document.getElementById("placeBetAction");
    const resetBtn = document.getElementById("resetBalanceBtn");
    const gameContainer = document.getElementById("gameContainer");
    const questionTextSpan = document.getElementById("questionText");
    const optionsListDiv = document.getElementById("optionsList");
    const submitAnswerBtn = document.getElementById("submitAnswer");
    const infoMsgDiv = document.getElementById("infoMsg");
    const subjectBtns = document.querySelectorAll(".subj-chip");

    // Обновление баланса на UI
    function updateBalanceUI() {
        balanceSpan.innerText = Math.floor(balance);
        if (balance <= 0) {
            infoMsgDiv.innerHTML = "💀 БАНКРОТ! Нажми 'СБРОС', чтобы получить 1500 монет и продолжить игру 💀";
            infoMsgDiv.style.background = "#2f1a24";
        }
    }

    function showMessage(text, isError = false) {
        infoMsgDiv.innerHTML = isError ? `⚠️ ${text}` : `✨ ${text}`;
        infoMsgDiv.style.background = isError ? "#26161e" : "#0c1f1a";
        infoMsgDiv.style.borderLeft = isError ? "4px solid #f57c5c" : "4px solid #f5b042";
        setTimeout(() => {
            if (infoMsgDiv.innerHTML === `⚠️ ${text}` || infoMsgDiv.innerHTML === `✨ ${text}`) {
                if (!activeGame) infoMsgDiv.innerHTML = "🎰 Сделайте новую ставку на вопрос ЕГЭ! Выберите предмет.";
                else infoMsgDiv.innerHTML = "🎲 Ставка принята! Ждём правильный ответ...";
            }
        }, 2800);
    }

    // Получить случайный вопрос из текущей категории
    function fetchRandomQuestion() {
        const bank = QUESTIONS_BANK[currentSubject];
        if (!bank || bank.length === 0) return null;
        const idx = Math.floor(Math.random() * bank.length);
        return { ...bank[idx] };
    }

    // отрисовка вопроса
    function renderQuestion(question) {
        questionTextSpan.innerText = question.text;
        optionsListDiv.innerHTML = "";
        selectedOptionIdx = null;
        question.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const optDiv = document.createElement("div");
            optDiv.classList.add("opt-card");
            optDiv.innerHTML = `
                <div class="opt-letter">${letter}</div>
                <div class="opt-text">${opt}</div>
            `;
            optDiv.addEventListener("click", () => {
                document.querySelectorAll(".opt-card").forEach(c => c.classList.remove("selected"));
                optDiv.classList.add("selected");
                selectedOptionIdx = idx;
            });
            optionsListDiv.appendChild(optDiv);
        });
        gameContainer.style.display = "block";
    }

    // Начать игру: списать ставку и показать вопрос
    function startGame() {
        if (activeGame) {
            showMessage("Сначала ответь на текущий вопрос!", true);
            return;
        }
        let bet = parseInt(betInput.value);
        if (isNaN(bet) || bet <= 0) {
            showMessage("Ставка должна быть положительным числом", true);
            return;
        }
        if (bet > balance) {
            showMessage(`Не хватает монет! Твой баланс: ${balance} 🪙`, true);
            return;
        }
        const newQuestion = fetchRandomQuestion();
        if (!newQuestion) {
            showMessage("Ошибка: вопросы для этого предмета не найдены", true);
            return;
        }
        // Списать ставку
        balance -= bet;
        updateBalanceUI();
        currentBet = bet;
        currentQuestion = newQuestion;
        activeGame = true;
        selectedOptionIdx = null;
        renderQuestion(currentQuestion);
        showMessage(`Ставка ${bet} 🪙 принята! Ответь верно и получишь ${bet * 2} 🪙`, false);
    }

    // Обработка ответа
    function handleAnswer() {
        if (!activeGame) {
            showMessage("Нет активной игры. Сделайте ставку!", true);
            return;
        }
        if (selectedOptionIdx === null) {
            showMessage("Выбери один из вариантов ответа!", true);
            return;
        }
        const isCorrect = (selectedOptionIdx === currentQuestion.correct);
        if (isCorrect) {
            const win = currentBet * 2;
            balance += win;
            updateBalanceUI();
            showMessage(`✅ ИДЕАЛЬНО! +${win} 🪙 (Баланс: ${balance})`, false);
            // анимация баланса
            const balSpan = document.querySelector(".balance-amount");
            balSpan.classList.add("win-effect");
            setTimeout(() => balSpan.classList.remove("win-effect"), 400);
        } else {
            const correctLetter = String.fromCharCode(65 + currentQuestion.correct);
            const correctAnswer = currentQuestion.options[currentQuestion.correct];
            showMessage(`❌ ОШИБКА! Правильный ответ: ${correctLetter}. ${correctAnswer}. Вы проиграли ${currentBet} 🪙`, true);
            if (balance <= 0) updateBalanceUI();
        }
        // завершение игры
        activeGame = false;
        currentBet = 0;
        gameContainer.style.display = "none";
        selectedOptionIdx = null;
        currentQuestion = null;
        // если баланс 0, напомним про сброс
        if (balance <= 0) {
            showMessage("Вы обанкротились! Используйте кнопку СБРОС", true);
        }
    }

    // Сброс баланса и отмена текущей игры (если активна)
    function resetBalanceAndGame() {
        if (activeGame) {
            if (confirm("Сброс баланса отменит текущую игру и вернёт ставку. Продолжить?")) {
                if (currentBet > 0) balance += currentBet;
                activeGame = false;
                currentBet = 0;
                gameContainer.style.display = "none";
                balance = 1500;
                updateBalanceUI();
                showMessage("Баланс восстановлен до 1500 🪙, игра сброшена", false);
            }
        } else {
            balance = 1500;
            updateBalanceUI();
            showMessage("Баланс восстановлен до 1500 монет!", false);
        }
    }

    // Смена предмета с очисткой активной игры
    function switchSubject(subjectKey) {
        if (activeGame) {
            const confirmChange = confirm(`Смена предмета отменит текущую игру и вернёт ставку ${currentBet} монет. Продолжить?`);
            if (!confirmChange) return;
            if (currentBet > 0) {
                balance += currentBet;
                updateBalanceUI();
            }
            activeGame = false;
            currentBet = 0;
            gameContainer.style.display = "none";
        }
        currentSubject = subjectKey;
        subjectBtns.forEach(btn => {
            if (btn.dataset.subj === subjectKey) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        let subjName = "";
        if (subjectKey === "math_base") subjName = "МАТЕМАТИКА (БАЗА)";
        else if (subjectKey === "math_prof") subjName = "МАТЕМАТИКА (ПРОФИЛЬ)";
        else if (subjectKey === "russian") subjName = "РУССКИЙ ЯЗЫК";
        else subjName = "ИНФОРМАТИКА";
        showMessage(`Предмет изменён: ${subjName}. Сделай новую ставку!`, false);
    }

    // Навесить обработчики на кнопки предметов
    subjectBtns.forEach(btn => {
        btn.addEventListener("click", (e) => {
            const subj = btn.dataset.subj;
            switchSubject(subj);
        });
    });

    placeBtn.addEventListener("click", startGame);
    submitAnswerBtn.addEventListener("click", handleAnswer);
    resetBtn.addEventListener("click", resetBalanceAndGame);
    betInput.addEventListener("change", () => {
        let val = parseInt(betInput.value);
        if (isNaN(val) || val < 10) betInput.value = 10;
        if (val > balance && !activeGame) betInput.value = Math.min(balance, val);
    });

    // начальное состояние
    updateBalanceUI();
    gameContainer.style.display = "none";
    showMessage("📚 ВЫБЕРИ ПРЕДМЕТ ЕГЭ, СТАВКА x2 ЗА ВЕРНЫЙ ОТВЕТ. УДАЧИ!", false);
</script>
</body>
</html>
