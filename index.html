
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🎰 NEON CASINO | ЕГЭ: ставки на интеллект</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #05050A;
            min-height: 100vh;
            padding: 20px 16px 32px;
            background-image: radial-gradient(circle at 20% 30%, rgba(80, 60, 160, 0.15) 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
        }

        /* главный контейнер */
        .casino-app {
            max-width: 550px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* неоновые карточки */
        .neon-card {
            background: rgba(12, 12, 22, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,175,55,0.2) inset;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* хедер с балансом */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(125deg, #0b0b18, #10101f);
            border-radius: 32px;
            border-bottom: 2px solid #D4AF37;
        }
        .brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F9E0A0, #D4AF37, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .brand p {
            font-size: 0.7rem;
            color: #9f9fc7;
        }
        .balance-block {
            background: #00000055;
            border-radius: 60px;
            padding: 8px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid #D4AF3740;
        }
        .balance-value {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(145deg, #FFE6A3, #F5A623);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* выбора предмета (свайп-лента) */
        .subjects-slider {
            overflow-x: auto;
            display: flex;
            gap: 12px;
            padding: 8px 4px 12px;
            scrollbar-width: thin;
        }
        .subjects-slider::-webkit-scrollbar {
            height: 4px;
        }
        .subj-neon {
            background: #13132b;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #cfd3ff;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            border: 1px solid #2a2f55;
        }
        .subj-neon.active {
            background: linear-gradient(105deg, #D4AF37, #B8860B);
            color: #0a0a12;
            border-color: #FFD966;
            box-shadow: 0 0 10px rgba(212,175,55,0.6);
        }

        /* зона ставки */
        .bet-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            padding: 16px 20px;
        }
        .bet-input-group {
            background: #0c0c18;
            border-radius: 60px;
            padding: 4px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 2;
        }
        .bet-input-group span {
            color: #D4AF37;
            font-weight: 600;
        }
        .bet-input {
            background: #1e1f36;
            border: none;
            padding: 12px 12px;
            border-radius: 50px;
            width: 110px;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
            color: #FFF2CF;
            font-family: monospace;
        }
        .btn-gold {
            background: radial-gradient(ellipse at 30% 30%, #FFCD6B, #E3A122);
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 4px 0 #7A4A0C;
            color: #141824;
        }
        .btn-gold:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7A4A0C;
        }
        .btn-dark {
            background: #1f1f32;
            box-shadow: 0 4px 0 #0a0a12;
            color: #FFE6B0;
        }

        /* вопросная арена */
        .question-zone {
            padding: 20px;
            transition: all 0.2s;
        }
        .q-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.4;
            color: #FCF3E0;
            border-left: 4px solid #D4AF37;
            padding-left: 16px;
            margin-bottom: 24px;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .opt-item {
            background: #0e0e1d;
            border-radius: 28px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            border: 1px solid #282e4e;
            transition: 0.1s;
        }
        .opt-item.selected {
            background: linear-gradient(115deg, #2c2746, #1f1c3a);
            border-color: #D4AF37;
            box-shadow: 0 0 0 2px #D4AF3770;
        }
        .opt-letter {
            font-weight: 800;
            background: #20253f;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 60px;
            font-size: 1.2rem;
            color: #D4AF37;
        }
        .opt-text {
            font-weight: 500;
            color: #E6EDFF;
        }
        .btn-submit-neon {
            background: #2D6B3C;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1rem;
            color: white;
            box-shadow: 0 4px 0 #1C4829;
            cursor: pointer;
        }

        /* статистика и история в сетке */
        .stats-flex {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 16px 20px;
        }
        .stat-block {
            background: #080814;
            border-radius: 24px;
            padding: 10px;
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 1.6rem;
            font-weight: 800;
            color: #D4AF37;
        }
        .history-scroll {
            max-height: 130px;
            overflow-y: auto;
            padding: 8px 16px 16px;
        }
        .history-item {
            background: #090911;
            border-radius: 40px;
            padding: 8px 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }
        .win-text { color: #7FE0A0; }
        .loss-text { color: #F5A97F; }

        .info-banner {
            background: #0a0a14;
            border-radius: 28px;
            padding: 12px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #C9D1FF;
            border-left: 3px solid #D4AF37;
        }
        footer {
            text-align: center;
            font-size: 0.65rem;
            color: #5b6085;
        }
        @media (max-width: 480px) {
            body { padding: 16px 12px; }
            .q-text { font-size: 1rem; }
            .balance-value { font-size: 1.4rem; }
            .btn-gold { padding: 10px 16px; }
        }
        .coin-flash {
            animation: blinkCoin 0.3s ease;
        }
        @keyframes blinkCoin {
            0% { text-shadow: 0 0 0 gold; }
            50% { text-shadow: 0 0 15px gold; transform: scale(1.05);}
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="casino-app">
    <!-- Верхняя панель -->
    <div class="header-area">
        <div class="brand">
            <h1>🎲 NEON<span style="color:#D4AF37">CASINO</span></h1>
            <p>ставь на знания ЕГЭ × удваивай</p>
        </div>
        <div class="balance-block">
            <span>🪙</span>
            <span class="balance-value" id="balanceValue">1500</span>
        </div>
    </div>

    <!-- Предметы (горизонтальный скролл) -->
    <div class="neon-card">
        <div style="padding: 12px 16px 0 16px; font-size:0.7rem; color:#D4AF37;">🎓 ВЫБЕРИ ПРЕДМЕТ ЕГЭ</div>
        <div class="subjects-slider" id="subjectsSlider">
            <button data-subj="math_base" class="subj-neon active">📐 МАТЕМАТИКА (БАЗА)</button>
            <button data-subj="math_prof" class="subj-neon">⚡ МАТЕМАТИКА (ПРОФ)</button>
            <button data-subj="russian" class="subj-neon">📖 РУССКИЙ ЯЗЫК</button>
            <button data-subj="inf" class="subj-neon">💻 ИНФОРМАТИКА</button>
        </div>
    </div>

    <!-- Блок ставки -->
    <div class="neon-card">
        <div class="bet-row">
            <div class="bet-input-group">
                <span>💰 СТАВКА</span>
                <input type="number" id="betAmount" class="bet-input" value="80" min="10" step="10">
            </div>
            <button id="placeBetButton" class="btn-gold">🎲 КРУТИТЬ</button>
            <button id="resetBalanceButton" class="btn-gold btn-dark">🔄 СБРОС</button>
        </div>
    </div>

    <!-- Динамическая зона вопроса (изначально скрыта) -->
    <div id="gameArea" class="neon-card question-zone" style="display: none;">
        <div class="q-text" id="questionText"></div>
        <div class="options-list" id="optionsList"></div>
        <button id="submitAnswerButton" class="btn-submit-neon">✅ ОТВЕТИТЬ (ВЫИГРЫШ ×2)</button>
    </div>

    <!-- Статистика + рекорды -->
    <div class="neon-card">
        <div class="stats-flex">
            <div class="stat-block"><div class="stat-number" id="totalCorrectStat">0</div><div>✅ ПОБЕД</div></div>
            <div class="stat-block"><div class="stat-number" id="currentStreakStat">0</div><div>🔥 СЕРИЯ</div></div>
            <div class="stat-block"><div class="stat-number" id="maxStreakStat">0</div><div>🏆 РЕКОРД</div></div>
        </div>
    </div>

    <!-- История ставок -->
    <div class="neon-card">
        <div style="padding: 14px 16px 0; font-weight:600;">📜 ПОСЛЕДНИЕ СТАВКИ</div>
        <div class="history-scroll" id="historyContainer">
            <div class="history-item">✨ Сделайте первую ставку</div>
        </div>
    </div>

    <!-- Инфо сообщение -->
    <div id="infoMessage" class="info-banner">
        🎰 Сделай ставку, ответь на вопрос ЕГЭ — удвой монеты!
    </div>
    <footer>⚡ Виртуальные монеты · Вопросы из банка ЕГЭ · Рискни эрудицией</footer>
</div>

<script>
    // ---------------------- БАЗА ВОПРОСОВ (расширенная) --------------------------
    const QUESTIONS = {
        math_base: [
            { text: "Вычислите: 0,75 + 1/4", options: ["1", "1,25", "0,5", "1,5"], correct: 0 },
            { text: "Какое число больше: 3/5 или 0,6?", options: ["равны", "3/5", "0,6", "не сравнить"], correct: 0 },
            { text: "Решите: 2x - 5 = 11", options: ["8", "7", "6", "9"], correct: 0 },
            { text: "Площадь квадрата 49 см². Найдите периметр.", options: ["28 см", "32 см", "24 см", "36 см"], correct: 0 },
            { text: "Скидка 25% на товар, цена стала 750 руб. Старая цена?", options: ["1000", "900", "800", "1100"], correct: 0 },
            { text: "Найдите 15% от 200", options: ["30", "20", "25", "35"], correct: 0 },
            { text: "Среднее арифметическое: 10, 20, 30", options: ["20", "25", "15", "30"], correct: 0 },
            { text: "Корень уравнения: 4ˣ = 64", options: ["3", "2", "4", "5"], correct: 0 },
            { text: "Сколько минут в 3,2 часа?", options: ["192", "180", "210", "200"], correct: 0 },
            { text: "Выразите 0,8 в процентах", options: ["80%", "8%", "0.8%", "800%"], correct: 0 }
        ],
        math_prof: [
            { text: "Найдите производную: y = ln x · x²", options: ["x(2 ln x + 1)", "2x ln x", "x(ln x + 1)", "2x ln x + x"], correct: 0 },
            { text: "Решите уравнение: 3^(x+1) = 27", options: ["2", "3", "1", "4"], correct: 0 },
            { text: "sin²α + cos²α = ?", options: ["1", "0", "-1", "не определено"], correct: 0 },
            { text: "Найдите значение: log₂ 32 - log₂ 4", options: ["3", "2", "4", "5"], correct: 0 },
            { text: "Векторы a(3; -4) и b(-6; 8) являются:", options: ["коллинеарными", "перпендикулярными", "сонаправленными", "противоположными"], correct: 0 },
            { text: "Точка минимума y = x³ - 3x", options: ["1", "-1", "0", "3"], correct: 0 },
            { text: "Вероятность выпадения 6 на кубике", options: ["1/6", "1/3", "1/2", "1/4"], correct: 0 },
            { text: "∫(4x³)dx", options: ["x⁴+C", "4x⁴+C", "x³+C", "12x²+C"], correct: 0 },
            { text: "Геометрическая прогрессия: 2; 6; 18; ... знаменатель?", options: ["3", "2", "4", "6"], correct: 0 }
        ],
        russian: [
            { text: "В каком слове пишется НН?", options: ["оловянный", "юный", "свиной", "ветреный"], correct: 0 },
            { text: "Укажите слово с чередованием в корне", options: ["заря", "гора", "водитель", "лесной"], correct: 0 },
            { text: "Ошибка в образовании формы слова:", options: ["более красивее", "пара носков", "пять килограммов", "лягте на пол"], correct: 0 },
            { text: "Средство выразительности: «Шепот леса»", options: ["олицетворение", "метафора", "эпитет", "сравнение"], correct: 0 },
            { text: "В каком ряду все слова с безударной проверяемой гласной?", options: ["посветить (фонарем), поласкать, объединить", "вырастить, касаться, замереть", "горевать, полоскать, удивить"], correct: 0 },
            { text: "Укажите верное объяснение запятой: «Солнце встало, но было холодно»", options: ["сложное предложение", "однородные члены", "обособление", "деепричастный оборот"], correct: 0 }
        ],
        inf: [
            { text: "1110₂ + 101₂ = ?", options: ["10011₂", "11011₂", "1011₂", "10001₂"], correct: 0 },
            { text: "Для какого числа ложно: (x > 5) И (x < 10) И НЕ (x = 7)?", options: ["7", "6", "8", "9"], correct: 0 },
            { text: "Сколько байт в 2 Кбайтах?", options: ["2048", "1024", "2000", "16000"], correct: 0 },
            { text: "Чему равно 5 % 2 в Python?", options: ["1", "2", "0", "5"], correct: 0 },
            { text: "Что выведет: print(2 * '5')", options: ["55", "10", "2*5", "ошибка"], correct: 0 },
            { text: "IP-адрес 10.0.0.1 относится к классу", options: ["A", "B", "C", "D"], correct: 0 },
            { text: "Для сайта http://www.exam.ru протокол?", options: ["http", "www", "exam.ru", "ru"], correct: 0 }
        ]
    };
    // Дополним для каждой категории, чтобы вопросов было много
    for(let cat in QUESTIONS) {
        if(QUESTIONS[cat].length < 8) QUESTIONS[cat] = [...QUESTIONS[cat], ...QUESTIONS[cat]];
    }

    // Глобальное состояние
    let balance = 1500;
    let currentSubject = "math_base";
    let activeGame = false;
    let currentBet = 0;
    let currentQuestionObj = null;
    let selectedOptionIndex = null;
    let totalCorrect = 0;
    let currentStreak = 0;
    let maxStreak = 0;
    let history = []; // {type, bet, winAmount}

    // DOM элементы
    const balanceSpan = document.getElementById("balanceValue");
    const betInput = document.getElementById("betAmount");
    const placeBtn = document.getElementById("placeBetButton");
    const resetBtn = document.getElementById("resetBalanceButton");
    const gameArea = document.getElementById("gameArea");
    const questionTextSpan = document.getElementById("questionText");
    const optionsListDiv = document.getElementById("optionsList");
    const submitBtn = document.getElementById("submitAnswerButton");
    const infoDiv = document.getElementById("infoMessage");
    const totalCorrectSpan = document.getElementById("totalCorrectStat");
    const currentStreakSpan = document.getElementById("currentStreakStat");
    const maxStreakSpan = document.getElementById("maxStreakStat");
    const historyContainer = document.getElementById("historyContainer");

    // Обновление UI баланса, статистики, истории
    function updateBalanceUI() {
        balanceSpan.innerText = Math.floor(balance);
        if (balance <= 0) {
            infoDiv.innerHTML = "💀 БАНКРОТ! Нажми 'СБРОС' и получи 1500 монет 💀";
            infoDiv.style.borderLeftColor = "#f57c5c";
        } else {
            if(!activeGame) infoDiv.innerHTML = "🎰 Сделай ставку на вопрос ЕГЭ и удвой монеты!";
            else infoDiv.innerHTML = "🎲 Ставка принята! Выбери ответ.";
        }
    }

    function updateStats() {
        totalCorrectSpan.innerText = totalCorrect;
        currentStreakSpan.innerText = currentStreak;
        maxStreakSpan.innerText = maxStreak;
    }

    function addHistoryItem(type, bet, winAmount = 0) {
        history.unshift({ type, bet, winAmount, timestamp: Date.now() });
        if (history.length > 5) history.pop();
        renderHistory();
    }

    function renderHistory() {
        if (history.length === 0) {
            historyContainer.innerHTML = '<div class="history-item">✨ Сделайте первую ставку</div>';
            return;
        }
        historyContainer.innerHTML = history.map(h => {
            if (h.type === 'win') {
                return `<div class="history-item"><span>✅ +${h.winAmount}🪙</span><span class="win-text">выигрыш</span></div>`;
            } else {
                return `<div class="history-item"><span>❌ -${h.bet}🪙</span><span class="loss-text">проигрыш</span></div>`;
            }
        }).join('');
    }

    function showMessage(text, isError = false) {
        infoDiv.innerHTML = isError ? `⚠️ ${text}` : `✨ ${text}`;
        infoDiv.style.borderLeftColor = isError ? "#f57c5c" : "#D4AF37";
        setTimeout(() => {
            if (infoDiv.innerHTML.includes(text)) {
                if (!activeGame && balance > 0) infoDiv.innerHTML = "🎰 Сделай ставку на вопрос ЕГЭ и удвой монеты!";
                else if (activeGame) infoDiv.innerHTML = "🎲 Ждём твой ответ...";
            }
        }, 2500);
    }

    function getRandomQuestion(subject) {
        const arr = QUESTIONS[subject];
        if (!arr || arr.length === 0) return null;
        return { ...arr[Math.floor(Math.random() * arr.length)] };
    }

    function renderCurrentQuestion() {
        if (!currentQuestionObj) return;
        questionTextSpan.innerText = currentQuestionObj.text;
        optionsListDiv.innerHTML = "";
        selectedOptionIndex = null;
        currentQuestionObj.options.forEach((opt, idx) => {
            const letter = String.fromCharCode(65 + idx);
            const optDiv = document.createElement("div");
            optDiv.className = "opt-item";
            optDiv.innerHTML = `<div class="opt-letter">${letter}</div><div class="opt-text">${opt}</div>`;
            optDiv.addEventListener("click", () => {
                document.querySelectorAll(".opt-item").forEach(el => el.classList.remove("selected"));
                optDiv.classList.add("selected");
                selectedOptionIndex = idx;
            });
            optionsListDiv.appendChild(optDiv);
        });
        gameArea.style.display = "block";
    }

    function startGame() {
        if (activeGame) {
            showMessage("Сначала ответь на текущий вопрос!", true);
            return;
        }
        let bet = parseInt(betInput.value);
        if (isNaN(bet) || bet < 10) {
            showMessage("Минимальная ставка 10 монет", true);
            return;
        }
        if (bet > balance) {
            showMessage(`Не хватает монет! Баланс: ${balance} 🪙`, true);
            return;
        }
        const question = getRandomQuestion(currentSubject);
        if (!question) {
            showMessage("Вопросы временно недоступны", true);
            return;
        }
        // списываем ставку
        balance -= bet;
        updateBalanceUI();
        currentBet = bet;
        currentQuestionObj = question;
        activeGame = true;
        selectedOptionIndex = null;
        renderCurrentQuestion();
        showMessage(`Ставка ${bet} 🪙 принята! Верный ответ = x2 (выигрыш ${bet*2} 🪙)`, false);
    }

    function handleAnswer() {
        if (!activeGame) {
            showMessage("Нет активной игры. Сделайте ставку!", true);
            return;
        }
        if (selectedOptionIndex === null) {
            showMessage("Выбери вариант ответа!", true);
            return;
        }
        const isCorrect = (selectedOptionIndex === currentQuestionObj.correct);
        if (isCorrect) {
            const win = currentBet * 2;
            balance += win;
            updateBalanceUI();
            totalCorrect++;
            currentStreak++;
            if (currentStreak > maxStreak) maxStreak = currentStreak;
            updateStats();
            addHistoryItem('win', currentBet, win);
            showMessage(`✅ Абсолютно верно! +${win} 🪙 (серия ${currentStreak})`, false);
            const balSpan = document.querySelector(".balance-value");
            balSpan.classList.add("coin-flash");
            setTimeout(() => balSpan.classList.remove("coin-flash"), 300);
        } else {
            const correctLetter = String.fromCharCode(65 + currentQuestionObj.correct);
            const correctAnswer = currentQuestionObj.options[currentQuestionObj.correct];
            showMessage(`❌ Ошибка! Правильный ответ: ${correctLetter}. ${correctAnswer}. Потеряно ${currentBet} 🪙`, true);
            addHistoryItem('loss', currentBet, 0);
            currentStreak = 0;
            updateStats();
            if (balance <= 0) updateBalanceUI();
        }
        activeGame = false;
        currentBet = 0;
        gameArea.style.display = "none";
        currentQuestionObj = null;
        selectedOptionIndex = null;
        if (balance <= 0) showMessage("Вы обанкротились! Используйте СБРОС", true);
    }

    function resetFull() {
        if (activeGame) {
            if (confirm("Сброс отменит текущую игру и вернёт ставку?")) {
                if (currentBet > 0) balance += currentBet;
                activeGame = false;
                gameArea.style.display = "none";
                currentBet = 0;
                balance = 1500;
                updateBalanceUI();
                showMessage("Баланс восстановлен до 1500 🪙, игра сброшена", false);
            }
        } else {
            balance = 1500;
            updateBalanceUI();
            showMessage("Баланс восстановлен до 1500 монет!", false);
        }
    }

    function changeSubject(subj) {
        if (activeGame) {
            const confirmSwitch = confirm(`Смена предмета вернёт ставку ${currentBet} монет. Продолжить?`);
            if (!confirmSwitch) return;
            if (currentBet > 0) {
                balance += currentBet;
                updateBalanceUI();
            }
            activeGame = false;
            gameArea.style.display = "none";
            currentBet = 0;
        }
        currentSubject = subj;
        document.querySelectorAll(".subj-neon").forEach(btn => {
            if (btn.dataset.subj === subj) btn.classList.add("active");
            else btn.classList.remove("active");
        });
        let subjName = { math_base:"МАТ. БАЗА", math_prof:"МАТ. ПРОФ", russian:"РУССКИЙ", inf:"ИНФОРМАТИКА" }[subj];
        showMessage(`Предмет изменён: ${subjName}. Сделай новую ставку!`, false);
    }

    // Назначение слушателей
    document.querySelectorAll(".subj-neon").forEach(btn => {
        btn.addEventListener("click", () => changeSubject(btn.dataset.subj));
    });
    placeBtn.addEventListener("click", startGame);
    submitBtn.addEventListener("click", handleAnswer);
    resetBtn.addEventListener("click", resetFull);
    betInput.addEventListener("change", () => {
        let v = parseInt(betInput.value);
        if (isNaN(v) || v < 10) betInput.value = 10;
        if (v > balance && !activeGame) betInput.value = Math.min(balance, v);
    });

    // Инициализация
    updateBalanceUI();
    updateStats();
    renderHistory();
    showMessage("✨ Добро пожаловать в NEON CASINO! Выбери предмет и сделай ставку ✨", false);
</script>
</body>
</html>
